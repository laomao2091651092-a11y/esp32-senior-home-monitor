<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银发智慧多设备健康检测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.3.5/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header .status {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
        }
        .status.connected { background: rgba(76, 175, 80, 0.8); }
        .status.disconnected { background: rgba(244, 67, 54, 0.8); }

        .control-bar {
            background: white;
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-bar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .control-bar button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .control-bar button:hover { background: #5568d3; }
        .control-bar .led-btn.on { background: #4CAF50; }
        .control-bar .led-btn.off { background: #f44336; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .data-label { color: #666; font-size: 14px; }
        .data-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        .data-value.warn { color: #ff9800; }
        .data-value.danger { color: #f44336; }
        .data-value.ok { color: #4CAF50; }

        .presence-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .presence-indicator.active {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        .presence-indicator.inactive {
            background: #9e9e9e;
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .chart-container h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .sleep-card {
            text-align: center;
        }
        .sleep-score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        .sleep-score.excellent { color: #4CAF50; }
        .sleep-score.good { color: #8BC34A; }
        .sleep-score.fair { color: #FF9800; }
        .sleep-score.poor { color: #f44336; }
        .sleep-state {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 15px;
            font-size: 14px;
            color: white;
            margin: 5px;
        }
        .sleep-state.awake { background: #FF9800; }
        .sleep-state.sleeping { background: #2196F3; }
        .sleep-state.waking { background: #9C27B0; }

        .alarm-log {
            max-height: 200px;
            overflow-y: auto;
        }
        .alarm-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            background: #fff3e0;
            font-size: 13px;
            border-left: 4px solid #ff9800;
        }
        .alarm-item.danger {
            background: #ffebee;
            border-left-color: #f44336;
        }
        .alarm-time { color: #999; font-size: 11px; }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 银发智慧多设备健康检测系统</h1>
            <div class="status disconnected" id="connStatus">● MQTT 未连接</div>
        </div>

        <div class="control-bar">
            <input type="text" id="brokerInput" placeholder="MQTT Broker (ws://)" value="ws://broker.emqx.io:8083/mqtt">
            <input type="text" id="prefixInput" placeholder="主题前缀" value="2023108380254_linzijie">
            <button onclick="connectMQTT()">连接</button>
            <button class="led-btn on" onclick="sendLedCmd(true)">💡 开灯</button>
            <button class="led-btn off" onclick="sendLedCmd(false)">💡 关灯</button>
            <button onclick="toggleAutoLight()">🤖 自动照明: <span id="autoLightStatus">开</span></button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>🌡️ 环境数据</h3>
                <div class="data-row">
                    <span class="data-label">温度</span>
                    <span class="data-value" id="tempValue">--.-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">湿度</span>
                    <span class="data-value" id="humiValue">--.-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">光照</span>
                    <span class="data-value" id="lightValue">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">气体</span>
                    <span class="data-value" id="gasValue">--</span>
                </div>
            </div>

            <div class="card">
                <h3>👤 人体存在</h3>
                <div class="data-row">
                    <span class="data-label">状态</span>
                    <span><span class="presence-indicator inactive" id="presenceDot"></span><span id="presenceText">无人</span></span>
                </div>
                <div class="data-row">
                    <span class="data-label">距离</span>
                    <span class="data-value" id="distanceValue">-- cm</span>
                </div>
                <div class="data-row">
                    <span class="data-label">运动强度</span>
                    <span class="data-value" id="moveValue">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">静止强度</span>
                    <span class="data-value" id="staticValue">--</span>
                </div>
            </div>

            <div class="card sleep-card">
                <h3>😴 睡眠监测</h3>
                <div class="sleep-state awake" id="sleepState">清醒</div>
                <div class="sleep-score" id="sleepScore">--</div>
                <div class="data-row">
                    <span class="data-label">睡眠时长</span>
                    <span class="data-value" id="sleepDuration">-- 分钟</span>
                </div>
                <div class="data-row">
                    <span class="data-label">起夜次数</span>
                    <span class="data-value" id="wakeupCount">-- 次</span>
                </div>
            </div>

            <div class="card">
                <h3>⚠️ 告警日志</h3>
                <div class="alarm-log" id="alarmLog">
                    <div style="color:#999;text-align:center;padding:20px;">暂无告警</div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <h3>📈 温湿度实时曲线</h3>
            <div class="chart-wrapper">
                <canvas id="tempHumiChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h3>💡 光照强度曲线</h3>
            <div class="chart-wrapper">
                <canvas id="lightChart"></canvas>
            </div>
        </div>

        <div class="footer">
            银发智慧多设备健康检测系统 | 基于 ESP32-C3 + MQTT + LD2450 毫米波雷达
        </div>
    </div>

    <script>
        let client = null;
        let autoLight = true;
        let tempData = [];
        let humiData = [];
        let lightData = [];
        let labels = [];
        const MAX_DATA = 60;

        let tempHumiChart = null;
        let lightChart = null;

        function initCharts() {
            const ctx1 = document.getElementById('tempHumiChart').getContext('2d');
            tempHumiChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '温度 (°C)',
                            data: tempData,
                            borderColor: '#f44336',
                            backgroundColor: 'rgba(244, 67, 54, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: '湿度 (%)',
                            data: humiData,
                            borderColor: '#2196F3',
                            backgroundColor: 'rgba(33, 150, 243, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', position: 'left', title: { display: true, text: '温度 (°C)' } },
                        y1: { type: 'linear', position: 'right', title: { display: true, text: '湿度 (%)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });

            const ctx2 = document.getElementById('lightChart').getContext('2d');
            lightChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '光照 (lux)',
                        data: lightData,
                        borderColor: '#FF9800',
                        backgroundColor: 'rgba(255, 152, 0, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { title: { display: true, text: '光照 (lux)' } } }
                }
            });
        }

        function connectMQTT() {
            const broker = document.getElementById('brokerInput').value;
            const prefix = document.getElementById('prefixInput').value;

            if (client) {
                client.end();
                client = null;
            }

            try {
                client = mqtt.connect(broker, {
                    clientId: 'web_dashboard_' + Math.random().toString(16).substr(2, 8),
                    clean: true,
                    reconnectPeriod: 3000
                });

                client.on('connect', () => {
                    document.getElementById('connStatus').className = 'status connected';
                    document.getElementById('connStatus').textContent = '● MQTT 已连接';

                    client.subscribe(prefix + '_evt');
                    client.subscribe(prefix + '_status');
                    client.subscribe(prefix + '_alarm');
                    client.subscribe(prefix + '_sleep');
                });

                client.on('message', (topic, message) => {
                    const data = JSON.parse(message.toString());
                    const topicName = topic.split('/').pop();

                    if (topic.endsWith('_evt')) {
                        handleSensorData(data);
                    } else if (topic.endsWith('_status')) {
                        handleStatus(data);
                    } else if (topic.endsWith('_alarm')) {
                        handleAlarm(data);
                    }
                });

                client.on('error', (err) => {
                    console.error('MQTT error:', err);
                });

                client.on('close', () => {
                    document.getElementById('connStatus').className = 'status disconnected';
                    document.getElementById('connStatus').textContent = '● MQTT 未连接';
                });
            } catch (e) {
                alert('连接失败: ' + e.message);
            }
        }

        function handleSensorData(data) {
            if (data.temperature !== undefined) {
                document.getElementById('tempValue').textContent = data.temperature.toFixed(1) + ' °C';
                const tempEl = document.getElementById('tempValue');
                tempEl.className = 'data-value ' + (data.temperature > 35 ? 'danger' : data.temperature > 30 ? 'warn' : 'ok');
            }
            if (data.humidity !== undefined) {
                document.getElementById('humiValue').textContent = data.humidity.toFixed(1) + ' %';
            }
            if (data.light !== undefined) {
                document.getElementById('lightValue').textContent = data.light.toFixed(0) + ' lux';
            }
            if (data.gas !== undefined) {
                document.getElementById('gasValue').textContent = data.gas ? '检测到' : '正常';
                document.getElementById('gasValue').className = 'data-value ' + (data.gas ? 'danger' : 'ok');
            }

            if (data.presence !== undefined) {
                const dot = document.getElementById('presenceDot');
                const text = document.getElementById('presenceText');
                dot.className = 'presence-indicator ' + (data.presence ? 'active' : 'inactive');
                text.textContent = data.presence ? '有人' : '无人';
            }
            if (data.presence_distance !== undefined) {
                document.getElementById('distanceValue').textContent = data.presence_distance + ' cm';
            }
            if (data.move_energy !== undefined) {
                document.getElementById('moveValue').textContent = data.move_energy;
            }
            if (data.static_energy !== undefined) {
                document.getElementById('staticValue').textContent = data.static_energy;
            }

            if (data.sleep_state !== undefined) {
                const stateEl = document.querySelector('.sleep-state');
                const stateMap = { 'awake': '清醒', 'sleeping': '睡眠中', 'waking': '苏醒中' };
                stateEl.className = 'sleep-state ' + data.sleep_state;
                stateEl.textContent = stateMap[data.sleep_state] || data.sleep_state;
            }
            if (data.sleep_duration_min !== undefined) {
                document.getElementById('sleepDuration').textContent = data.sleep_duration_min + ' 分钟';
            }
            if (data.wakeup_count !== undefined) {
                document.getElementById('wakeupCount').textContent = data.wakeup_count + ' 次';
            }
            if (data.sleep_quality !== undefined) {
                const scoreEl = document.getElementById('sleepScore');
                const scoreMap = { 'excellent': 90, 'good': 75, 'fair': 60, 'poor': 40 };
                const score = data.sleep_quality_score || scoreMap[data.sleep_quality] || 0;
                scoreEl.textContent = score;
                scoreEl.className = 'sleep-score ' + data.sleep_quality;
            }

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                           now.getMinutes().toString().padStart(2, '0') + ':' +
                           now.getSeconds().toString().padStart(2, '0');

            labels.push(timeStr);
            tempData.push(data.temperature || null);
            humiData.push(data.humidity || null);
            lightData.push(data.light || null);

            if (labels.length > MAX_DATA) {
                labels.shift();
                tempData.shift();
                humiData.shift();
                lightData.shift();
            }

            tempHumiChart.update('none');
            lightChart.update('none');
        }

        function handleStatus(data) {
            console.log('Status:', data);
        }

        function handleAlarm(data) {
            const logDiv = document.getElementById('alarmLog');
            if (logDiv.querySelector('div').style && logDiv.querySelector('div').style.color) {
                logDiv.innerHTML = '';
            }
            const item = document.createElement('div');
            item.className = 'alarm-item ' + (data.alarm_type === 'emergency' ? 'danger' : '');
            const now = new Date();
            item.innerHTML = `
                <div class="alarm-time">${now.toLocaleTimeString()}</div>
                <strong>${data.alarm_type || '告警'}</strong>: ${data.message || ''}
            `;
            logDiv.insertBefore(item, logDiv.firstChild);
        }

        function sendLedCmd(on) {
            const prefix = document.getElementById('prefixInput').value;
            if (client && client.connected) {
                client.publish(prefix + '_cmd', on ? '1' : '0');
            }
        }

        function toggleAutoLight() {
            autoLight = !autoLight;
            document.getElementById('autoLightStatus').textContent = autoLight ? '开' : '关';
        }

        initCharts();
    </script>
</body>
</html>
